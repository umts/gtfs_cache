name: Jenkins Reachability Check

on:
  push:
    branches:
      - benmelz/jenkins-deployment
jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      HOST: jenkins.umass.edu
      WEBHOOK_PATH: /github-webhook/
      API_PATH: /api/json
      CRUMB_PATH: /crumbIssuer/api/json

    steps:
      - name: Runner egress IP (so you can cross-check firewall logs)
        run: curl -sf https://api.ipify.org && echo

      - name: "── PORT 80 ──────────────────────────────────"
        run: echo ""

      - name: "[80] API endpoint"
        run: |
          echo ">>> GET http://$HOST$API_PATH"
          curl -sv --max-time 10 "http://$HOST$API_PATH" 2>&1 || true

      - name: "[80] Crumb issuer (auth probe)"
        run: |
          echo ">>> GET http://$HOST$CRUMB_PATH"
          curl -sv --max-time 10 "http://$HOST$CRUMB_PATH" 2>&1 || true
